<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>

      color: #222;
    }

    .container {
      padding: 60px 20px;
    }

    .banner {

      color: #000;

      font-weight: bold;

      border-radius: 6px;

    </div>
  </div>

</html>
